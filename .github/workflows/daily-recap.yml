name: Daily Internship Recap

on:
  schedule:
    - cron: "0 9 * * 1"      # 5:00 AM America/New_York, Mondays only -- includes the heavy Uber scan
    - cron: "0 11 * * 0,2-6" # 7:00 AM America/New_York, every other day -- normal scan
  workflow_dispatch:
    inputs:
      heavy_scan:
        description: "Run the periodic heavy scan (e.g. Uber) on this manual run"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  recap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine scan mode
        id: mode
        run: |
          if [ "${{ github.event.schedule }}" = "0 9 * * 1" ] || [ "${{ github.event.inputs.heavy_scan }}" = "true" ]; then
            echo "heavy=true" >> "$GITHUB_OUTPUT"
          else
            echo "heavy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Scan companies
        run: |
          extra_args=""
          if [ "${{ steps.mode.outputs.heavy }}" = "true" ]; then
            extra_args="--heavy-scan"
          fi
          python3 internship_tracker.py companies.txt --term "summer 2027" --json --workers 8 $extra_args > scan_result.json

      - name: Update seen-postings ledger
        run: python3 scripts/update_ledger.py scan_result.json .state/seen_postings.json .state/companies_seen.json scan_result_enriched.json

      - name: Build recap
        run: python3 scripts/format_recap.py scan_result_enriched.json "${{ steps.mode.outputs.heavy }}" > recap.html

      - name: Email recap
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.mail.me.com
          server_port: 587
          username: ${{ secrets.ICLOUD_EMAIL }}
          password: ${{ secrets.ICLOUD_APP_PASSWORD }}
          subject: "Internship Tracker Daily Recap"
          to: ${{ secrets.ICLOUD_EMAIL }},chill5@friars.providence.edu
          from: ${{ secrets.ICLOUD_EMAIL }}
          html_body: file://recap.html

      - name: Commit updated ledger
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .state/seen_postings.json .state/companies_seen.json
          git diff --staged --quiet || git commit -m "Update seen-postings ledger [skip ci]"
          git push
